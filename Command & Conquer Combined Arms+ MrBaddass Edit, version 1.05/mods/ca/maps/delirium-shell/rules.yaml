Player:
	-ConquestVictoryConditions:
World:
	-CrateSpawner:
	-StartGameNotification:
	MusicPlaylist:
		BackgroundMusic: moi
		DisableWorldSounds: true
	LuaScript:
		Scripts: shellmap.lua
	WeatherOverlay@RAIN:
		WindTick: 150, 550
		UseSquares: false
		ScatterDirection: 0, 0
		Gravity: 2.00, 4.00
		SwingOffset: 0, 0
		SwingSpeed: 0, 0
		SwingAmplitude: 0, 0
		ParticleColors: 72aaae, 72aea6, 5caea3, 6da69f
		LineTailAlphaValue: 150
		ParticleSize: 1, 1
	GlobalLightingPaletteEffect:
		Red: 1.22
		Green: 1.27
		Blue: 1.15
		Ambient: 0.55
		ExcludePalettes: fog, shroud, cursor, chrome, chrometd, chromes, colorpicker, fog, shroud, tseffect, ra2effect, ra2unit, tdeffect, effect,  effect-ignore-lighting, tdeffect-ignore-lighting-alpha85, d2keffect-ignore-lighting-alpha75, d2keffect-ignore-lighting-alpha50, ra2effect-ignore-lighting-alpha90, ra2effect-ignore-lighting-alpha75, ra2effect-ignore-lighting-alpha50, tseffect-ignore-lighting-alpha75, tsunit-ignore-lighting-alpha75, ra2unit-ignore-lighting-alpha75, ra2unit-ignore-lighting-alpha90, tseffect-ignore-lighting-alpha90

^AutoTargetGround:
	AutoTargetPriority@DEFAULT:
		ValidTargets: Infantry, Vehicle, Water, Underwater, Structure, Defense
		InvalidTargets: NoAutoTarget

^AutoTargetAll:
	AutoTargetPriority@DEFAULT:
		ValidTargets: Infantry, Vehicle, Water, Underwater, Structure, Defense
		InvalidTargets: NoAutoTarget

^Infantry:
	GainsExperience:
		Conditions:
	DeathSounds@NORMAL:
		VolumeMultiplier: 0.1
	DeathSounds@BURNED:
		VolumeMultiplier: 0.1
	DeathSounds@ZAPPED:
		VolumeMultiplier: 0.1

^Ship:
	GainsExperience:
		Conditions:
	DamageMultiplier@UNKILLABLE:
		RequiresCondition: unkillable
		Modifier: 50
	ExternalCondition@UNKILLABLE:
		Condition: unkillable

^Building:
	DamageMultiplier@UNKILLABLE:
		RequiresCondition: unkillable
		Modifier: 5
	ExternalCondition@UNKILLABLE:
		Condition: unkillable

^Defense:
	DamageMultiplier@UNKILLABLE:
		RequiresCondition: unkillable
		Modifier: 20
	ExternalCondition@UNKILLABLE:
		Condition: unkillable

^Wall:
	DamageMultiplier@UNKILLABLE:
		RequiresCondition: unkillable
		Modifier: 0
	ExternalCondition@UNKILLABLE:
		Condition: unkillable

^Bridge:
	DamageMultiplier@UNKILLABLE:
		Modifier: 0

powerproxy.paratroopers:
	ParatroopersPower:
		DisplayBeacon: false
		DropItems: E1,E1,E2,E3,E4

PROC:
	FreeActor:
		RequiresCondition: spawn-harv && !spawn-charv && build-incomplete
	FreeActor@CHARV:
		RequiresCondition: spawn-charv && !spawn-harv && build-incomplete
APWR:
	PowerMultiplier:
		Modifier: 300

PDOX:
	ChronoshiftPowerCA@chronoshift:
		OrderName: Chronoshift
		PauseOnCondition: disabled
		Icon: chrono
		ChargeInterval: 3000
		Name: Chronoshift
		Description: Teleports a group of units across\nthe map for 20 seconds.
		SelectTargetSpeechNotification: SelectTarget
		InsufficientPowerSpeechNotification: InsufficientPower
		BeginChargeSpeechNotification: ChronosphereCharging
		EndChargeSpeechNotification: ChronosphereReady
		Duration: 400
		KillCargo: true
		DisplayRadarPing: True
		SupportPowerPaletteOrder: 20
