# MW Base Templates for CA edit
# All MW units inherit from these instead of CA's ^Infantry/^Building etc.
# Inherits from ^ExistsInWorld only (safe - no Tiberium, warp, mind control, force shields)

^MWInfantry:
	Inherits: ^ExistsInWorld
	ClassicFacingBodyOrientation:
	QuantizeFacingsFromSequence:
		Sequence: stand
	RenderSprites:
		Palette: mwbase
	HitShape:
	Selectable:
		Bounds: 768, 768, 0, -256
		DecorationBounds: 512, 725, 0, -256
	SelectionDecorations:
	WithSpriteControlGroupDecoration:
	HiddenUnderFog:
	Mobile:
		Locomotor: foot
		Speed: 55
		Voice: Move
	Guard:
		Voice: Move
	Guardable:
	AttackMove:
		Voice: Attack
	AutoTarget:
		ScanRadius: 5
		InitialStance: AttackAnything
	DrawLineToTarget:
	ActorLostNotification:
	WithInfantryBody:
		DefaultAttackSequence: shoot
		IdleSequences: idle1, idle2
		StandSequences: stand
	WithDeathAnimation:
		DeathSequencePalette: player
		DeathTypes:
			DefaultDeath: 1
			RippedApartDeath: 2
			PoisonDeath: 3
			BallistaDeath: 4
			BurnToDeath: 5
			SkeletonDeath: 5
		CrushedSequence: die-crushed
	Crushable:
		WarnProbability: 75
		CrushSound: squishy2.aud
	Targetable:
		TargetTypes: Ground, Infantry
	Targetable@HEAL:
		RequiresCondition: damaged
		TargetTypes: Heal
	GrantConditionOnDamageState@DAMAGED:
		Condition: damaged
		ValidDamageStates: Light, Medium, Heavy, Critical
	Valued:
	Tooltip:
		GenericName: Soldier
	Health:
		HP: 40000
	Armor:
		Type: Leather
	RevealsShroud:
		Range: 5c0

