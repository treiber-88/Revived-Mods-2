# MW Kingdom Buildings - rewritten for CA edit engine

MWFACT:
	Inherits: ^MWBuilding
	RenderSprites:
		Image: newfact
		Palette: mwbase
	Building:
		Footprint: xxx xxx ===
		Dimensions: 3,3
		LocalCenterOffset: 0,-512,0
	Selectable:
		Bounds: 3072, 3072
	HitShape:
		Type: Rectangle
			TopLeft: -36,-36
			BottomRight: 36,36
	Health:
		HP: 500000
	Armor:
		Type: Concrete
	RevealsShroud:
		Range: 10c0
	Exit@1:
		SpawnOffset: -18,18,0
		ExitCell: -1,1
	Exit@2:
		SpawnOffset: 18,18,0
		ExitCell: 0,1
	Valued:
		Cost: 2000
	Tooltip:
		Name: Keep
		GenericName: Construction Yard
	Buildable:
		IconPalette: mwicon
		BuildPaletteOrder: 10
		Prerequisites: ~disabled
		Description: The heart of your Kingdom. Constructs all buildings.
		Queue: MWBuilding
		Factions: kingdom, baron, sultanate, undead
	Production:
		Produces: MWBuilding
	CashTrickler:
		Interval: 300
		Amount: 50
	MustBeDestroyed:
		RequiredForShortGame: true
	ProvidesPrerequisite:
		Prerequisite: mwfact
	WithIdleOverlay:
		Sequence: active
		RequiresCondition: production
	RepairableBuilding:
		RepairPercent: 40
		RepairStep: 3000
		PlayerExperience: 15

