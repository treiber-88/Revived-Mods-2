SIEGE3:
	Inherits: ^MWSiege
	RenderSprites:
		Image: sgtw
		Palette: mwbase
	ClassicFacingBodyOrientation:
		QuantizedFacings: 32
	QuantizeFacingsFromSequence:
		Sequence: stand
	Mobile:
		Locomotor: mwsiege
		Crushes: crate, infantry
		Speed: 55
		Voice: Move
	Valued:
		Cost: 800
	Tooltip:
		Name: Siege Tower
		GenericName: Siege Weapon
	Buildable:
		IconPalette: mwicon
		BuildPaletteOrder: 303
		Prerequisites: mwbarr
		Description: Mobile siege tower. Transports up to 6 infantry. Can attack air.
		Queue: MWSiege
		Factions: kingdom, baron, sultanate, undead
	Health:
		HP: 100000
	Armor:
		Type: HeavyCavalry
	Selectable:
		Bounds: 1536, 2048, 0, -512
		DecorationBounds: 1536, 2048, 0, -512
	Cargo:
		MaxWeight: 6
		PipCount: 6
		Types: Infantry
		EjectOnDeath: true
	AttackTurreted:
		Voice: Attack
	Turreted@1:
		Turret: primary
		TurnSpeed: 255
		Offset: 6,-6,40
	Turreted@2:
		Turret: secondary
		TurnSpeed: 255
		Offset: -6,0,40
	Turreted@3:
		Turret: tertiary
		TurnSpeed: 255
		Offset: 6,6,40
	WithSpriteTurret@1:
		Sequence: turretidle
		AimSequence: turretanim
		Turret: primary
	WithSpriteTurret@2:
		Sequence: turretidle
		AimSequence: turretanim
		Turret: secondary
	WithSpriteTurret@3:
		Sequence: turretidle
		AimSequence: turretanim
		Turret: tertiary
	Armament@1:
		Weapon: BowNArrow
		LocalOffset: 0,0,18
		Turret: primary
	Armament@2:
		Weapon: BowNArrow
		LocalOffset: 0,0,18
		Turret: secondary
		FireDelay: 15
	Armament@3:
		Weapon: BowNArrow
		LocalOffset: 0,0,18
		Turret: tertiary
		FireDelay: 30
	Armament@1Air:
		Weapon: BowNArrowAir
		LocalOffset: 0,0,18
		Turret: primary
	Armament@2Air:
		Weapon: BowNArrowAir
		LocalOffset: 0,0,18
		Turret: secondary
		FireDelay: 15
	Armament@3Air:
		Weapon: BowNArrowAir
		LocalOffset: 0,0,18
		Turret: tertiary
		FireDelay: 30
	AutoTarget:
		ScanRadius: 7
		InitialStance: AttackAnything

