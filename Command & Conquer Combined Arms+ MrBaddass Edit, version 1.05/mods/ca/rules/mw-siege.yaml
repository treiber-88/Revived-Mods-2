# MW Kingdom Siege Weapons - rewritten for CA edit engine

SIEGE1:
	Inherits: ^MWSiege
	RenderSprites:
		Image: siege1
		Palette: mwbase
	ClassicFacingBodyOrientation:
		QuantizedFacings: 32
	QuantizeFacingsFromSequence:
		Sequence: stand
	Mobile:
		Locomotor: mwsiege
		Speed: 60
		Voice: Move
	Valued:
		Cost: 950
	Tooltip:
		Name: Siege Ballista
		GenericName: Siege Weapon
	Buildable:
		IconPalette: mwicon
		BuildPaletteOrder: 301
		Prerequisites: mwhq
		Description: Long-range ballista. Very strong against cavalry and buildings.
		Queue: MWSiege
		Factions: kingdom, baron, sultanate, undead
	Health:
		HP: 10000
	Armor:
		Type: LightCavalry
	Selectable:
		Bounds: 1024, 1024, 0, -256
		DecorationBounds: 1024, 1024, 0, -256
	Armament:
		Weapon: SiegeBalista
		LocalOffset: 30,0,4
	AttackFrontal:
		Voice: Attack
	AutoTarget:
		ScanRadius: 11
		InitialStance: AttackAnything

