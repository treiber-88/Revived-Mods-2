	ClassicFacingBodyOrientation:
		QuantizedFacings: 1
	RenderSprites:
		Image: koenig
		Palette: mwbase
	WithSpriteBody:
		Sequence: stand-dead
	Health:
		HP: 1
	Armor:
	HitShape:
	Tooltip:
		Name: Surrendered
	Mobile:
		Locomotor: foot
		Speed: 0
	Selectable:
		Bounds: 768, 768, 0, -256
	SelectionDecorations:
	HiddenUnderFog:
	SpawnActorOnDeath:
		Actor: KING
	ProvidesPrerequisite:
