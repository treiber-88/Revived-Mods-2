# MW Kingdom Defenses - rewritten for CA edit engine

MWGTW:
	Inherits: ^MWBuilding
	RenderSprites:
		Image: gtwnew
		Palette: mwbase
	Building:
		Footprint: x
		Dimensions: 1,1
	Selectable:
		Bounds: 22,48,0,-10
	HitShape:
		Type: Rectangle
			TopLeft: -11,-24
			BottomRight: 11,24
	Health:
		HP: 40000
	Armor:
		Type: HeavyBuilding
	RevealsShroud:
		Range: 7c0
	DetectCloaked:
	Valued:
		Cost: 600
	Tooltip:
		Name: Guard Tower
		GenericName: Tower
	Buildable:
		IconPalette: mwicon
		BuildPaletteOrder: 401
		Prerequisites: mwbarr
		Description: Dual archer tower. Detects cloaked units.
		Queue: MWDefense
		Factions: kingdom, baron, sultanate, undead
	AttackTurreted:
		Voice: Attack
	ClassicFacingBodyOrientation:
		QuantizedFacings: 8
	Turreted@1:
		Turret: primary
		TurnSpeed: 100
		Offset: -7,-7,21
	Turreted@2:
		Turret: secondary
		TurnSpeed: 100
		Offset: 7,7,21
	Armament@1:
		Weapon: BowNArrowTower
		LocalOffset: 0,0,18
		Turret: primary
	Armament@1DUMMY:
		Weapon: BowNArrowTowerDUMMY
		LocalOffset: 0,0,18
		Turret: primary
	Armament@2:
		Weapon: BowNArrowTower
		LocalOffset: 0,0,18
		Turret: secondary
		FireDelay: 12
	Armament@2DUMMY:
		Weapon: BowNArrowTowerDUMMY
		LocalOffset: 0,0,18
		Turret: secondary
		FireDelay: 12
	AutoTarget:
		ScanRadius: 8
		InitialStance: AttackAnything
	WithIdleOverlay:
		Sequence: idle-overlay
	RepairableBuilding:
		RepairPercent: 40
		RepairStep: 1000
		PlayerExperience: 15

