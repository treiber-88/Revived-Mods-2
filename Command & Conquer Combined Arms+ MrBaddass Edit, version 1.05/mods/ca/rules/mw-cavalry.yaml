# MW Kingdom Cavalry - rewritten for CA edit engine

KINGROSS:
	Inherits: ^MWCavalry
	-WithInfantryBody:
	WithInfantryBody:
		DefaultAttackSequence: shoot2
		AttackSequences:
			Secondary: shoot2
			Primary: shoot
		IdleSequences: idle1, idle2
		StandSequences: stand
	RenderSprites:
		Image: kingross
		Palette: mwbase
	Mobile:
		Locomotor: mwcavalry
		Speed: 110
		Voice: Move
	RevealsShroud:
		Range: 7c0
	DetectCloaked:
	GivesBountyCA:
		Percentage: 50
	Valued:
		Cost: 2500
	Tooltip:
		Name: Your Highness
		GenericName: Cavalry
	Buildable:
		IconPalette: mwicon
		BuildPaletteOrder: 1000
		Prerequisites: ~disabled
		Description: The King on horseback. Devastating crossbow and sword attack.\\n  Detects cloaked units. Cannot be built.
		Queue: MWCavalry
		Factions: kingdom, baron, sultanate, undead
		BuildLimit: 1
	Health:
		HP: 65000
	Armor:
		Type: Knight
	Armament:
		Weapon: KingCrossbow
		Name: Primary
		LocalOffset: 0,0,500
	Armament@Air:
		Weapon: KingCrossbowAir
		LocalOffset: 0,0,500
		Name: Primary
	Armament@Ground:
		Weapon: KingsSwordMounted
		Name: Secondary
		LocalOffset: 0,0,500
	AttackFrontal:
		Armaments: Primary, Secondary
		Voice: Attack
	AutoTarget:
		ScanRadius: 6
		InitialStance: AttackAnything
	Voiced:
		VoiceSet: CommandoVoice
	AnnounceOnKill:

